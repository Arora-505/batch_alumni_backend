<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices | BatchMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">BatchMate RUET CSE</a>
      <nav class="navbar-menu">
        <a href="index.html" class="navbar-link">Directory</a>
        <a href="profile.html" class="navbar-link">My Profile</a>
        <a href="find.html" class="navbar-link">Find</a>

      <button type="button" class="navbar-toggle" aria-label="Toggle menu">
        <span class="navbar-toggle-bar"></span><span class="navbar-toggle-bar"></span><span class="navbar-toggle-bar"></span>
      </button>
    </div>
  </header>

  <main class="page container">
    <h1>Notice Board</h1>
    <div id="notice-form-wrap" class="panel" hidden>
      <h2>Post Notice (Admin)</h2>
      <form id="notice-form" class="form-grid">
        <label class="full">Title <input name="title" required></label>
        <label class="full">Description <textarea name="description" required></textarea></label>
        <div class="full"><button type="submit" class="btn btn-primary">Publish Notice</button></div>
      </form>
    </div>
    <div id="notice-list" class="stack"></div>
  </main>

  <script src="/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/script.js"></script>
  <script src="js/notices.js"></script>
