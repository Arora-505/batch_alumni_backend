<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Students | BatchMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="navbar-container">
        <a href="index.html" class="navbar-logo">BatchMate RUET CSE</a>
        <nav class="navbar-menu">
          <a href="index.html" class="navbar-link">Directory</a>
          <a href="profile.html" class="navbar-link">My Profile</a>
          <a href="find.html" class="navbar-link active">Find</a>
          <a href="notices.html" class="navbar-link">Notices</a>

          <a href="#" class="navbar-btn ghost" data-logout>Logout</a>
        </nav>
        <button type="button" class="navbar-toggle" aria-label="Toggle menu">
          <span class="navbar-toggle-bar"></span
          ><span class="navbar-toggle-bar"></span
          ><span class="navbar-toggle-bar"></span>
        </button>
      </div>
    </header>

    <main class="page container">
      <h1>Find Students</h1>
      <form id="find-form" class="panel filter-grid">
        <input name="name" placeholder="Search by name" />
        <input name="city" placeholder="Filter by city" />
        <input name="country" placeholder="Filter by country" />
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
      <div id="find-grid" class="card-grid"></div>
      <p id="find-empty" class="empty" hidden>No matching students found.</p>
    </main>

    <script src="/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/script.js"></script>
    <script src="js/find.js"></script>
  </body>
